<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <div style="background: #1e40af; padding: 20px; text-align: center; border-radius: 8px 8px 0 0;">
    <h1 style="color: white; margin: 0;">QuickT</h1>
  </div>
  <div style="background: #f9fafb; padding: 30px; border-radius: 0 0 8px 8px;">
    <p>Bonjour {{USER_NAME}},</p>
    <p>Rappel: vous avez un voyage prevu pour <strong>{{TRIP_DATE}}</strong>.</p>
    <p><strong>Trajet:</strong> {{ORIGIN}} → {{DESTINATION}}</p>
    <p style="text-align: center; margin: 30px 0;">
      <a href="{{SEARCH_LINK}}" style="background: #f97316; color: white; padding: 12px 30px; text-decoration: none; border-radius: 8px; font-weight: bold;">
        Rechercher des departs
      </a>
    </p>
  </div>
</body>
</html>
